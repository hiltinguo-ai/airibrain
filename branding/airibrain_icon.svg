<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3fd0ff"/>
      <stop offset="1" stop-color="#2f6fe0"/>
    </linearGradient>
  </defs>
  <!-- squircle -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#g)"/>
  <!-- neural "A": apex + feet are nodes, synapse lines between -->
  <path d="M19 45 L32 17 L45 45" fill="none" stroke="#ffffff" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- crossbar doubles as a signal line -->
  <path d="M25.5 36.5 H38.5" fill="none" stroke="#ffffff" stroke-width="5"
        stroke-linecap="round"/>
  <!-- nodes -->
  <circle cx="32" cy="17" r="4.2" fill="#ffffff"/>
  <circle cx="19" cy="45" r="4.2" fill="#ffffff"/>
  <circle cx="45" cy="45" r="4.2" fill="#ffffff"/>
  <circle cx="32" cy="17" r="1.7" fill="#2f6fe0"/>
  <circle cx="19" cy="45" r="1.7" fill="#2f6fe0"/>
  <circle cx="45" cy="45" r="1.7" fill="#2f6fe0"/>
  <!-- thought sparks -->
  <circle cx="49" cy="13.5" r="2.6" fill="#ffffff" opacity=".95"/>
  <circle cx="54" cy="20" r="1.7" fill="#ffffff" opacity=".7"/>
</svg>
